shipkit_design_source: .docs/shipkit-skills-refactor-design.md
implementation_root: skills
version: shipkit-full-flow-v2
principles:
  - 单一完整推进 workflow: full_flow
  - meta.yml 是跨窗口单一事实源
  - 阶段技能必须显式接收 feature_dir
  - TODO preflight 保证会话内任务保真
  - 只有 orchestrator 能创建初始 feature 目录和持久化 Build approval
  - workspace scope 限定探索和 spec 加载范围
skills:
  - name: ship-orchestrator
    path: ship-orchestrator/SKILL.md
    type: orchestrator
    required: true
    covers:
      - 是否进入 ShipKit feature flow 的入口判断
      - 读取 .docs/ship/project.yml 并确认 workspace scope
      - 创建或恢复 feature 目录与 meta.yml
      - 登记 source_refs
      - 状态推进和阻塞恢复
      - Design 到 Build 用户确认门禁与 build_approved_* 持久化
      - 下一阶段 handoff
  - name: ship-split
    path: ship-split/SKILL.md
    type: optional_pre_stage
    required: false
    covers:
      - 大需求拆分建议
      - splits.yml
      - suggested_slug/suggested_feature_name
      - 依赖追踪
      - handoff 回 orchestrator 批量创建 feature
  - name: ship-understand
    path: ship-understand/SKILL.md
    type: core_stage
    required: true
    covers:
      - feature_dir 硬前置
      - source_refs 读取
      - workspace scope 限定探索
      - requirements.md
      - Understand 阶段 blocking review
  - name: ship-design
    path: ship-design/SKILL.md
    type: core_stage
    required: true
    covers:
      - feature_dir 硬前置
      - Design Reference Template 选择与引用
      - API Contract
      - 数据模型
      - 前后端方案合一
      - Design 阶段 blocking review
      - handoff 回 orchestrator 处理 Build approval
  - name: ship-build
    path: ship-build/SKILL.md
    type: core_stage
    required: true
    covers:
      - feature_dir 硬前置
      - build_approved_at 校验
      - build-plan.yml
      - 实现顺序
      - 自动化测试
      - AC 验证报告
      - spec 完成后更新
  - name: ship-spec
    path: ship-spec/SKILL.md
    type: cli_tool
    required: true
    covers:
      - ship-spec CLI 工具引导
      - .docs/spec 知识库管理
      - 规范采集和沉淀标准
      - workspace/projects 隔离
      - 规范沉淀评分
      - spec 与模板边界
  - name: ship-grill-me
    path: ship-grill-me/SKILL.md
    type: embedded_helper
    required: true
    covers:
      - Understand/Design blocking review
      - 先查仓库/spec/source_refs 再问用户
      - 一次只问一个问题
      - 证据、推荐答案、影响
      - Design 模板 blocking 审查
validators:
  core:
    - ship-orchestrator/scripts/validate_requirements.py
    - ship-orchestrator/scripts/validate_design.py
    - ship-orchestrator/scripts/validate_build.py
  aggregate:
    - ship-orchestrator/scripts/validate_current_stage.py
templates:
  - ship-orchestrator/templates/meta.yml.template
  - ship-orchestrator/templates/requirements.md.template
  - ship-orchestrator/templates/design.md.template
  - ship-orchestrator/templates/build-plan.yml.template
  - ship-orchestrator/templates/verification.md.template
  - ship-orchestrator/templates/splits.yml.template
  - ship-orchestrator/templates/design-reference/INDEX.md
  - ship-orchestrator/templates/design-reference/backend-service.md
  - ship-orchestrator/templates/design-reference/frontend-ui.md
  - ship-orchestrator/templates/design-reference/fullstack-feature.md
  - ship-orchestrator/templates/design-reference/async-task.md
  - ship-orchestrator/templates/design-reference/data-migration.md
  - ship-orchestrator/templates/design-reference/integration.md
  - ship-orchestrator/templates/design-reference/config-change.md
tests:
  - ship-orchestrator/tests/test_validators.py
acceptance:
  - ACCEPTANCE.md
