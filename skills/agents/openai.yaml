schema_version: 2
entrypoint: ship-orchestrator
default_view:
  - Discover
  - Define
  - Understand
  - Design
  - Plan
  - Build
  - Verify
  - Close
notes:
  - Use ship-orchestrator as the default user-facing entrypoint.
  - The suite is optimized for solo developers and lightweight gates.
  - Review skills are optional checklists, not hard gates by default.
  - Canonical runtime stages are defined in ship-orchestrator/_templates/protocol/workflow-protocol.md.
maintenance_commands:
  - python3 skills/ship-orchestrator/scripts/validate_workflow_docs.py
  - python3 skills/ship-orchestrator/scripts/workflow_stage_map.py --list
validators:
  workflow_docs:
    - skills/ship-orchestrator/scripts/validate_workflow_docs.py
  implementation:
    - skills/ship-orchestrator/scripts/implementation_preflight.py
    - skills/ship-orchestrator/scripts/build_task_preflight.py
  optional_legacy:
    - skills/ship-orchestrator/scripts/validate_feature_artifacts.py
    - skills/ship-orchestrator/scripts/workflow_doctor.py
