<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>[Feature Name] - Variant Template</title>
  <!--
    React 18.3.1 + Babel 7.29.0 pinned versions.
    实施时必须补充 integrity SRI hash（sha384-...），可通过以下命令生成：
      curl -s <CDN_URL> | openssl dgst -sha384 -binary | openssl base64 -A
    或使用 https://www.srihash.org/ 在线生成。
    生产用法示例：
      <script crossorigin integrity="sha384-..." src="..."></script>
  -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <style>
    /* === DESIGN TOKENS (replace with actual values from design-brief) === */
    :root {
      /* Colors */
      --color-primary: #2563eb;
      --color-primary-hover: #1d4ed8;
      --color-surface: #ffffff;
      --color-surface-elevated: #f8f9fa;
      --color-on-surface: #1a1c1e;
      --color-on-primary: #ffffff;
      --color-border: #e2e5e9;
      --color-error: #dc2626;
      --color-success: #16a34a;

      /* Typography */
      --font-heading: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: "SF Mono", "Fira Code", monospace;

      /* Spacing (8px unit) */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
      --space-12: 48px;
      --space-16: 64px;

      /* Radii */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 9999px;

      /* Elevation */
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 8px rgba(0,0,0,0.1);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      background: var(--color-surface-elevated);
      color: var(--color-on-surface);
      line-height: 1.5;
    }
    #root { min-height: 100vh; }

    /* === PLACEHOLDER UTILITIES === */
    .placeholder-img {
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      font-size: 12px;
      border-radius: var(--radius-md);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ============================================================
    // WIREFRAME VARIANT TEMPLATE
    // Replace this with actual page components for the feature.
    // Each variant file should implement the same pages/flows
    // but with different visual treatment.
    // ============================================================

    function App() {
      const [currentPage, setCurrentPage] = React.useState('home');

      return (
        <div style={{ minHeight: '100vh' }}>
          {/* Navigation */}
          <nav style={{
            background: 'var(--color-surface)',
            borderBottom: '1px solid var(--color-border)',
            padding: 'var(--space-4) var(--space-6)',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'space-between'
          }}>
            <div style={{ fontWeight: 600, fontSize: 18 }}>[Feature Name]</div>
            <div style={{ display: 'flex', gap: 'var(--space-4)' }}>
              <button onClick={() => setCurrentPage('home')}
                style={{ background: 'none', border: 'none', cursor: 'pointer',
                  color: currentPage === 'home' ? 'var(--color-primary)' : 'var(--color-on-surface)' }}>
                首页
              </button>
              <button onClick={() => setCurrentPage('detail')}
                style={{ background: 'none', border: 'none', cursor: 'pointer',
                  color: currentPage === 'detail' ? 'var(--color-primary)' : 'var(--color-on-surface)' }}>
                详情
              </button>
            </div>
          </nav>

          {/* Page Content */}
          <main style={{ padding: 'var(--space-8) var(--space-6)', maxWidth: 1280, margin: '0 auto' }}>
            {currentPage === 'home' && <HomePage />}
            {currentPage === 'detail' && <DetailPage />}
          </main>
        </div>
      );
    }

    function HomePage() {
      return (
        <div>
          <h1 style={{ fontSize: 32, fontWeight: 700, marginBottom: 'var(--space-2)' }}>
            [页面标题]
          </h1>
          <p style={{ color: '#6b7280', marginBottom: 'var(--space-8)' }}>
            [页面描述 - 使用真实语境的占位文案]
          </p>

          {/* Content placeholder */}
          <div className="placeholder-img" style={{ height: 200, marginBottom: 'var(--space-6)' }}>
            [主要内容区域 - 宽度 100% × 高度 200px]
          </div>
        </div>
      );
    }

    function DetailPage() {
      return (
        <div>
          <h1 style={{ fontSize: 24, fontWeight: 600, marginBottom: 'var(--space-6)' }}>
            [详情页标题]
          </h1>
          <div className="placeholder-img" style={{ height: 300 }}>
            [详情内容区域]
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
